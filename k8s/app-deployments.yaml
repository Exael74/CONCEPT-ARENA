# S2/S1: Deployments + Services for the six app services. Replicas > 1 here actually run N pods
# (unlike compose's deploy.replicas). Statefulness is externalized so these scale horizontally:
# game-engine uses Redis (RedisGameStateStore/RoundEndGuard), room-service uses Redis, rate limiters
# use Redis, and STOMP fans out via the RabbitMQ relay (all under SPRING_PROFILES_ACTIVE=docker).
# Liveness/readiness use Actuator /actuator/health (O13). Resource requests/limits feed the HPA.
#
# NOTE: this file covers the stateless app tier. The stateful infra (Postgres x4, Redis x2, RabbitMQ)
# should be deployed via their official Helm charts / managed services and exposed under the Service
# names in the ConfigMap — see k8s/README.md.
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: api-gateway, namespace: conceptarena }
spec:
  replicas: 2
  selector: { matchLabels: { app: api-gateway } }
  template:
    metadata: { labels: { app: api-gateway } }
    spec:
      containers:
        - name: api-gateway
          image: conceptarena/api-gateway:latest
          ports: [ { containerPort: 8080 } ]
          envFrom:
            - configMapRef: { name: conceptarena-config }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "384Mi" }
          readinessProbe: { httpGet: { path: /actuator/health, port: 8080 }, initialDelaySeconds: 30, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: /actuator/health, port: 8080 }, initialDelaySeconds: 45, periodSeconds: 15 }
---
apiVersion: v1
kind: Service
metadata: { name: api-gateway, namespace: conceptarena }
spec:
  selector: { app: api-gateway }
  ports: [ { port: 8080, targetPort: 8080 } ]
  # The only service that should be public — front it with an Ingress/LoadBalancer (D1).
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: auth-service, namespace: conceptarena }
spec:
  replicas: 2
  selector: { matchLabels: { app: auth-service } }
  template:
    metadata: { labels: { app: auth-service } }
    spec:
      containers:
        - name: auth-service
          image: conceptarena/auth-service:latest
          ports: [ { containerPort: 8081 } ]
          envFrom:
            - configMapRef: { name: conceptarena-config }
          env:
            - { name: JWT_SECRET, valueFrom: { secretKeyRef: { name: conceptarena-secrets, key: JWT_SECRET } } }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "384Mi" }
          readinessProbe: { httpGet: { path: /actuator/health, port: 8081 }, initialDelaySeconds: 30, periodSeconds: 10 }
          livenessProbe: { httpGet: { path: /actuator/health, port: 8081 }, initialDelaySeconds: 45, periodSeconds: 15 }
---
apiVersion: v1
kind: Service
metadata: { name: auth-service, namespace: conceptarena }
spec:
  selector: { app: auth-service }
  ports: [ { port: 8081, targetPort: 8081 } ]
