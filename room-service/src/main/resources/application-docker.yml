spring:
  data:
    redis:
      host: ${REDIS_HOST:room-redis}
      port: ${REDIS_PORT:6379}
  datasource:
    url: jdbc:postgresql://${ROOM_OUTBOX_DB_HOST:room-outbox-db}:${ROOM_OUTBOX_DB_PORT:5432}/${ROOM_OUTBOX_DB_NAME:room_outbox}
    driver-class-name: org.postgresql.Driver
    username: ${ROOM_OUTBOX_DB_USER:postgres}
    password: ${ROOM_OUTBOX_DB_PASSWORD:postgres}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 100
  flyway:
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    # Propagate the trace context over the message bus so a trace continues across the
    # outbox -> consumer hop, not only across HTTP (audit gap #7).
    template:
      observation-enabled: true
    listener:
      simple:
        observation-enabled: true

# Distributed tracing (audit gap #7): report spans to Zipkin (only under the docker profile).
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

logging:
  level:
    com.conceptarena: INFO

app:
  jwt:
    secret: ${JWT_SECRET}   # required — no default, fails fast if unset
  rate-limiter:
    # Audit gap #2: shared Redis sliding-window limiter so the 5/s room-action cap holds across
    # replicas (in-memory by default, so unit tests need no Redis). See RedisRoomActionRateLimiter.
    store: redis
  stomp:
    relay:
      # Audit gap #7 intended this to fan /topic/lobby and /topic/rooms/{id}/participants broadcasts
      # out across replicas via RabbitMQ's STOMP plugin. Found broken in production (2026-07-21):
      # rabbitmq_stomp's `/topic/<name>` destination syntax rejects a `<name>` containing further
      # '/' segments — "/topic/rooms/{roomId}/participants" is exactly that, so the relay rejected
      # every one of those ("not a valid topic destination"), silently dropping the broadcast (the
      # single-segment "/topic/lobby" was unaffected). Disabled back to SimpleBroker (in-process, no
      # slash restriction) until destinations are migrated to a relay-safe format (e.g. dot-separated:
      # "/topic/rooms.{roomId}.participants") in lockstep with the frontend's subscribe paths. Only
      # 1 replica of this service runs today, so SimpleBroker's single-instance-only reach is not
      # currently a real limitation.
      enabled: ${STOMP_RELAY_ENABLED:false}
      host: ${RABBITMQ_HOST:rabbitmq}
      port: ${STOMP_RELAY_PORT:61613}
