spring:
  data:
    redis:
      host: ${REDIS_HOST:room-redis}
      port: ${REDIS_PORT:6379}
  datasource:
    url: jdbc:postgresql://${ROOM_OUTBOX_DB_HOST:room-outbox-db}:${ROOM_OUTBOX_DB_PORT:5432}/${ROOM_OUTBOX_DB_NAME:room_outbox}
    driver-class-name: org.postgresql.Driver
    username: ${ROOM_OUTBOX_DB_USER:postgres}
    password: ${ROOM_OUTBOX_DB_PASSWORD:postgres}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 200
  flyway:
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

logging:
  level:
    com.conceptarena: INFO

app:
  jwt:
    secret: ${JWT_SECRET}   # required — no default, fails fast if unset
