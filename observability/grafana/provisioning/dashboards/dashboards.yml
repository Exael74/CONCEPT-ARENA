# Loads every dashboard JSON under /var/lib/grafana/dashboards on startup (audit gap #2) so the
# ConceptArena overview is present and showing data the moment Grafana boots.
apiVersion: 1
providers:
  - name: conceptarena
    orgId: 1
    folder: ConceptArena
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
