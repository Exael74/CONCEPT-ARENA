# Promtail (audit gap #2): discovers every running container via the Docker socket and ships its
# stdout/stderr to Loki, labelling each line with the container name and stream. The logback configs
# emit JSON, so those lines land in Loki as structured, correlationId-searchable logs.
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
