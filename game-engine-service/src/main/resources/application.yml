server:
  port: 8083

spring:
  application:
    name: game-engine-service
  datasource:
    url: jdbc:h2:mem:game;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        # Slow-query visibility (audit #4): log any query slower than 100ms. The docker profile
        # keeps the same threshold on Postgres, complemented by log_min_duration_statement on the DB.
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 100
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    # A7: broker acks each published message (correlated) and returns unroutable ones.
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        # Don't fail to start if the declared queues don't exist yet on the broker (or the
        # broker itself isn't reachable) — see RoomReadModelEventConsumer's class comment.
        missing-queues-fatal: false
        # A6: after the retries below are exhausted, reject WITHOUT requeue so the message is
        # dead-lettered to conceptarena.game.dlx instead of looping forever (poison-message safety).
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
          multiplier: 2

logging:
  level:
    com.conceptarena: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
        conceptarena.events: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
        conceptarena.events: 0.5, 0.95, 0.99

app:
  jwt:
    secret: ${JWT_SECRET:conceptarena-dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
