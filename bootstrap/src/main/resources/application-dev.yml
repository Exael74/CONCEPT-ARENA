spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/conceptarena
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    locations: classpath:db/migration

logging:
  level:
    com.conceptarena: DEBUG
