logging:
  level:
    com.conceptarena: INFO

app:
  jwt:
    secret: ${JWT_SECRET}   # required — no default, fails fast if unset

# Distributed tracing (audit gap #7): report spans to Zipkin (only under the docker profile).
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
