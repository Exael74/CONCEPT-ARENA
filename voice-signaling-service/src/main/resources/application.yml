server:
  port: 8085

spring:
  application:
    name: voice-signaling-service

logging:
  level:
    com.conceptarena: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99

app:
  jwt:
    secret: ${JWT_SECRET:conceptarena-dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
