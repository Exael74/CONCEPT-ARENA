spring:
  datasource:
    url: jdbc:postgresql://${CONCEPTBANK_DB_HOST:conceptbank-db}:${CONCEPTBANK_DB_PORT:5432}/${CONCEPTBANK_DB_NAME:conceptbank}
    driver-class-name: org.postgresql.Driver
    username: ${CONCEPTBANK_DB_USER:postgres}
    password: ${CONCEPTBANK_DB_PASSWORD:postgres}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # See docs/architecture-decisions — DB slow-query visibility (audit gap).
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 100
  flyway:
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    # Propagate the trace context over the message bus so a trace continues across the
    # outbox -> consumer hop, not only across HTTP (audit gap #7).
    template:
      observation-enabled: true
    listener:
      simple:
        observation-enabled: true

# Distributed tracing (audit gap #7): report spans to Zipkin. Sampling 1.0 traces everything, which
# is fine at this scale; set only under the docker profile so tests/local runs emit no spans.
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

logging:
  level:
    com.conceptarena: INFO

app:
  jwt:
    secret: ${JWT_SECRET}   # required — no default, fails fast if unset
