spring:
  datasource:
    url: jdbc:postgresql://${CONCEPTBANK_DB_HOST:conceptbank-db}:${CONCEPTBANK_DB_PORT:5432}/${CONCEPTBANK_DB_NAME:conceptbank}
    driver-class-name: org.postgresql.Driver
    username: ${CONCEPTBANK_DB_USER:postgres}
    password: ${CONCEPTBANK_DB_PASSWORD:postgres}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # See docs/architecture-decisions — DB slow-query visibility (audit gap).
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 200
  flyway:
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

logging:
  level:
    com.conceptarena: INFO

app:
  jwt:
    secret: ${JWT_SECRET}   # required — no default, fails fast if unset
