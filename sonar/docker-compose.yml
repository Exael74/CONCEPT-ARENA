# Local SonarQube server for static analysis + coverage. Independent of the app stack
# (docker-compose.yml) — run it on its own:
#
#   docker compose -f sonar/docker-compose.yml up -d
#   # wait ~1 min for http://localhost:9000 to come up (first login admin/admin, then set a token)
#   mvn clean verify                         # runs tests + writes JaCoCo jacoco.xml per module
#   mvn sonar:sonar -Dsonar.token=<TOKEN>    # uploads analysis + coverage to the server
#
# See sonar/README.md.
services:
  sonarqube-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonarqube-db-data:/var/lib/postgresql/data

  sonarqube:
    image: sonarqube:10-community
    restart: unless-stopped
    depends_on:
      - sonarqube-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs

volumes:
  sonarqube-db-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
