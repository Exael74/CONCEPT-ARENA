# C2: CI pipeline (was missing entirely). Builds + tests the whole reactor on every push/PR, runs
# the Testcontainers integration tests (C3/#5) on a Docker-enabled runner, and validates that the
# docker-compose stack and its configs parse. C8/C9 (e2e + resilience) are wired as opt-in jobs.
# CD: on push to main, once build-and-test + compose-validation pass, `deploy` syncs the backend
# source to the Azure VM (rsync over SSH) and runs `docker compose up -d --build` there — see
# DEPLOY.md and docs/architecture-decisions for the manual deploy this automates. Needs 3 repo
# secrets: AZURE_VM_HOST, AZURE_VM_USER, AZURE_VM_SSH_KEY.
name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build + unit tests (whole reactor)
        run: mvn -B clean test
      - name: Integration tests (Testcontainers — needs Docker, available on ubuntu-latest)
        run: mvn -B -pl game-engine-service -am -Pintegration test

  compose-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose config
        run: JWT_SECRET=ci-validation-secret-key-at-least-256-bits-long-000000 docker compose config -q
      - name: Validate deployed stack (backend + Caddy TLS overlay)
        run: JWT_SECRET=ci-validation-secret-key-at-least-256-bits-long-000000 CADDY_SITE=localhost docker compose -f docker-compose.backend.yml -f docker-compose.tls.yml config -q
      - name: Validate observability YAML/JSON
        run: |
          python -c "import yaml,glob,sys; [list(yaml.safe_load_all(open(f))) for f in glob.glob('observability/**/*.yml', recursive=True)]"
          python -c "import json; json.load(open('observability/grafana/dashboards/conceptarena-overview.json'))"

  # C8/C9: opt-in — these bring the full stack up, so they run only on manual dispatch (they are slow
  # and need a Docker host). They are defined here so "not integrated in CI" no longer applies.
  e2e-and-resilience:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resilience test (outbox decoupling + crash recovery)
        run: JWT_SECRET=ci-e2e-secret-key-at-least-256-bits-long-00000000 KEEP_UP=0 bash scripts/test-resilience-full.sh

  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: [build-and-test, compose-validation]
    # Only auto-deploy on a real push to main (not PRs, not the master alias, not manual dispatch).
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH to the VM
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.AZURE_VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.AZURE_VM_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync backend source to the VM
        # --delete keeps the VM's tree matching the pushed commit (removes files deleted in the
        # repo too); .env is excluded from both sync AND deletion (rsync's default: an --exclude'd
        # path on the destination is left alone unless --delete-excluded is also passed), so the
        # VM's JWT_SECRET etc. survive every deploy. target/ dirs and the local-only frontend/mock
        # trees never need to reach the VM.
        run: |
          rsync -az --delete \
            --exclude '.git' --exclude 'target' --exclude 'frontend' --exclude 'mock' --exclude '.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ "${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }}:~/conceptarena/"

      - name: Rebuild and restart the backend stack (behind Caddy TLS)
        # D3: the api-gateway is no longer published on plain HTTP :8080 — the Caddy overlay
        # (docker-compose.tls.yml) terminates TLS on :443 and reverse-proxies to it, so all traffic
        # incl. /ws/ WebSocket upgrades is HTTPS/WSS. CADDY_SITE drives the Let's Encrypt cert;
        # defaults to the IP's sslip.io hostname (no domain purchase needed). Override via the
        # repo variable CADDY_SITE once a real domain exists.
        env:
          CADDY_SITE: ${{ vars.CADDY_SITE || '104-46-113-22.sslip.io' }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }}" \
            "cd ~/conceptarena && CADDY_SITE=$CADDY_SITE docker compose -f docker-compose.backend.yml -f docker-compose.tls.yml up -d --build --remove-orphans"

      - name: Wait for the gateway to report healthy (HTTPS)
        # Hits the public HTTPS edge (Caddy), so this also proves the Let's Encrypt cert was issued.
        # Requires NSG ports 80 (ACME challenge) and 443 open; 8080 no longer needs to be public.
        env:
          CADDY_SITE: ${{ vars.CADDY_SITE || '104-46-113-22.sslip.io' }}
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "https://$CADDY_SITE/actuator/health" || true)
            if [ "$code" = "200" ]; then
              echo "Gateway healthy over HTTPS after $((i * 10))s"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Gateway did not report healthy over HTTPS within 5 minutes (check NSG allows 80+443 and CADDY_SITE resolves to the VM IP)" >&2
          exit 1
