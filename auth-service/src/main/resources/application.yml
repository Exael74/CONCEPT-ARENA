server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:h2:mem:auth;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        # Slow-query visibility (audit #4): log any query slower than 100ms. The docker profile
        # keeps the same threshold on Postgres, complemented by log_min_duration_statement on the DB.
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 100
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    # A7: broker acks each published message (correlated) and returns unroutable ones, so the outbox
    # publisher can detect a publish that RabbitMQ never accepted instead of assuming success.
    publisher-confirm-type: correlated
    publisher-returns: true

logging:
  level:
    com.conceptarena: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
        conceptarena.events: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
        conceptarena.events: 0.5, 0.95, 0.99

app:
  jwt:
    secret: ${JWT_SECRET:conceptarena-dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
    # D4: default 2h (was 24h). The token also rides WS-handshake URLs (see ADR-011), so keep the
    # default short-lived even when JWT_EXPIRATION_MS isn't overridden.
    expiration-ms: ${JWT_EXPIRATION_MS:7200000}
  otp:
    # Default in-memory store (dev/tests, no Redis). The docker profile switches to redis so codes
    # are shared across replicas — see RedisOtpStore.
    store: ${OTP_STORE:in-memory}
  mail:
    # Default off: LoggingEmailSender logs instead of sending, so dev/tests need no SMTP. The docker
    # profile enables SMTP against MailHog — see SmtpEmailSender.
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:no-reply@conceptarena.app}
