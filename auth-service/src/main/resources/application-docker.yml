spring:
  data:
    redis:
      host: ${REDIS_HOST:auth-redis}
      port: ${REDIS_PORT:6379}
  datasource:
    url: jdbc:postgresql://${AUTH_DB_HOST:auth-db}:${AUTH_DB_PORT:5432}/${AUTH_DB_NAME:auth}
    driver-class-name: org.postgresql.Driver
    username: ${AUTH_DB_USER:postgres}
    password: ${AUTH_DB_PASSWORD:postgres}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 100
  flyway:
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    # Propagate the trace context over the message bus so a trace continues across the
    # outbox -> consumer hop, not only across HTTP (audit gap #7).
    template:
      observation-enabled: true
    listener:
      simple:
        observation-enabled: true

# Distributed tracing (audit gap #7): report spans to Zipkin. Sampling 1.0 traces everything, which
# is fine at this scale; set only under the docker profile so tests/local runs emit no spans.
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

logging:
  level:
    com.conceptarena: INFO

app:
  jwt:
    secret: ${JWT_SECRET}   # required — no default, fails fast if unset
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  rate-limiter:
    # Audit gap #2: shared Redis sliding-window limiter so the 10/min auth cap holds across
    # replicas (in-memory by default, so unit tests need no Redis). See RedisAuthRateLimiter.
    store: redis
